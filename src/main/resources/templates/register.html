<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register - Event Finder</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="d-flex flex-column min-vh-100">

<nav class="navbar navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">❤️ Event Finder</a>
        <div>
            <a href="/" class="btn btn-outline-light me-2">Home</a>
            <a href="/about" class="btn btn-outline-light me-2">About</a>
            <a href="/login" class="btn btn-warning">Login</a>
        </div>
    </div>

</nav>

<div class="container my-5 flex-grow-1">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h2 class="text-center text-primary mb-4">Create Account</h2>
            <form th:action="@{/register}" th:object="${user}" method="post">

                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <input type="text" class="form-control" th:field="*{name}" placeholder="Enter your name">
                    </div>

                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" th:field="*{email}" placeholder="Enter your email">
                </div>

                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control" th:field="*{password}" placeholder="Enter your password">
                </div>

                <div class="mb-3">
                    <label class="form-label">City</label>
                    <input type="text" class="form-control" th:field="*{city}" placeholder="Enter your city">
                </div>

                <button type="submit" class="btn btn-primary w-100">Register</button>
            </form>



        </div>
    </div>
</div>

<footer class="bg-dark text-white text-center py-3 mt-auto">
    <p class="mb-0">© 2026 Event Finder App — Built with Spring Boot</p>
</footer>
</body>


</html>
